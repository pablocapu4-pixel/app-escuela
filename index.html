<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Sistema CENS 451</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#eef2f5;margin:0}
.hidden{display:none}
header{background:#2c3e50;color:#fff;padding:12px;display:flex;justify-content:space-between}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;padding:18px;border-radius:10px;margin-bottom:18px;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.portal{display:flex;justify-content:center;gap:20px;margin-top:120px}
.portal button{width:200px;height:110px;font-size:18px;color:#fff;border:none;border-radius:10px;cursor:pointer}
.dir{background:#8e44ad}
.doc{background:#2980b9}
.est{background:#27ae60}
button{padding:8px;border:none;border-radius:5px;cursor:pointer}
input,select{padding:6px;margin:4px}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<div id="portal">
<div class="portal">
<button class="dir" onclick="preLogin('director')">DIRECTIVOS</button>
<button class="doc" onclick="preLogin('docente')">DOCENTES</button>
<button class="est" onclick="preLogin('estudiante')">ESTUDIANTES</button>
</div>
</div>

<div id="login" class="hidden">
<div class="container">
<div class="card">
<h3>Ingreso al sistema</h3>
<input id="dni" placeholder="DNI"><br>
<input id="pass" type="password" value="123456"><br>
<button onclick="login()">Ingresar</button>
<p id="error" style="color:red"></p>
</div>
</div>
</div>

<div id="app" class="hidden">
<header>
<div id="usuario"></div>
<button onclick="logout()">Salir</button>
</header>

<div class="container">

<!-- PANEL DIRECTIVO -->
<div id="director" class="hidden">

<div class="card">
<h3>Alta de usuario</h3>
<input id="ad-dni" placeholder="DNI">
<input id="ad-nombre" placeholder="Nombre">
<select id="ad-rol">
<option value="estudiante">Estudiante</option>
<option value="docente">Docente</option>
<option value="director">Directivo</option>
</select>
<input id="ad-anio" placeholder="Año">
<button onclick="crearUsuario()">Crear usuario</button>
</div>

<div class="card">
<h3>Usuarios</h3>
<div id="listaUsuarios"></div>
</div>

<div class="card">
<h3>Estadísticas</h3>
<div id="stats"></div>
</div>

</div>

<!-- PANEL DOCENTE -->
<div id="docente" class="hidden">

<div class="card">
<h3>Materias</h3>
<select id="materias" onchange="cargarAlumnos()"></select>
</div>

<div class="card hidden" id="planilla">
<div id="tabla"></div>
<button onclick="guardarNotas()">Guardar evaluaciones</button>
</div>

</div>

<!-- PANEL ESTUDIANTE -->
<div id="estudiante" class="hidden">

<div class="card">
<h3>Mi boletín</h3>
<div id="boletin"></div>
<button onclick="exportarPDF()">Descargar PDF</button>
</div>

</div>

</div>
</div>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
apiKey:"TU_API_KEY",
authDomain:"TU_AUTH_DOMAIN",
projectId:"TU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let user=null;
let rol="";

function preLogin(r){
rol=r;
portal.classList.add("hidden");
login.classList.remove("hidden");
}

async function login(){
const dni=document.getElementById("dni").value;
const pass=document.getElementById("pass").value;

try{

await auth.signInWithEmailAndPassword(dni+"@cens451.edu.ar",pass);

const doc=await db.collection("usuarios").doc(dni).get();
user={id:dni,...doc.data()};

abrirSistema();

}catch{
error.innerText="Error de acceso";
}
}

function abrirSistema(){
login.classList.add("hidden");
app.classList.remove("hidden");
usuario.innerText=user.nombre;

if(user.rol=="director"){
director.classList.remove("hidden");
cargarUsuarios();
estadisticas();
}

if(user.rol=="docente"){
docente.classList.remove("hidden");
cargarMaterias();
}

if(user.rol=="estudiante"){
estudiante.classList.remove("hidden");
cargarBoletin();
}
}

// CREAR USUARIO
async function crearUsuario(){

const dni=ad-dni.value;
const nombre=ad-nombre.value;
const rol=ad-rol.value;
const anio=ad-anio.value;

await auth.createUserWithEmailAndPassword(dni+"@cens451.edu.ar","123456");

await db.collection("usuarios").doc(dni).set({
nombre:nombre,
rol:rol,
año:anio
});

alert("Usuario creado");

cargarUsuarios();
}

// LISTAR USUARIOS
async function cargarUsuarios(){

const snap=await db.collection("usuarios").get();

let html="<table>";

snap.forEach(d=>{
const u=d.data();
html+=`<tr>
<td>${d.id}</td>
<td>${u.nombre}</td>
<td>${u.rol}</td>
</tr>`;
});

html+="</table>";
listaUsuarios.innerHTML=html;

}

// ESTADISTICAS
async function estadisticas(){

const alumnos=(await db.collection("usuarios").where("rol","==","estudiante").get()).size;
const docentes=(await db.collection("usuarios").where("rol","==","docente").get()).size;
const evals=(await db.collection("evaluaciones").get()).size;

stats.innerHTML=`
Alumnos: ${alumnos}<br>
Docentes: ${docentes}<br>
Evaluaciones cargadas: ${evals}
`;

}

// MATERIAS DOCENTE
function cargarMaterias(){

const sel=document.getElementById("materias");
sel.innerHTML="";

const m=user.MATERIAS||{};

for(let a in m){
m[a].forEach(mat=>{
let op=document.createElement("option");
op.value=mat+"|"+a;
op.innerText=mat+" - Año "+a;
sel.appendChild(op);
});
}
}

// ALUMNOS
async function cargarAlumnos(){

const v=materias.value;
const [mat,anio]=v.split("|");

planilla.classList.remove("hidden");

const snap=await db.collection("usuarios")
.where("rol","==","estudiante")
.where("año","==",anio)
.get();

let html="";

snap.forEach(d=>{

html+=`
<div data-dni="${d.id}">
${d.data().nombre}
<select id="r${d.id}">
<option></option>
<option>TEA</option>
<option>TEP</option>
<option>TED</option>
</select>
<input id="n${d.id}" type="number">
</div>
`;

});

tabla.innerHTML=html;

}

// GUARDAR
async function guardarNotas(){

const v=materias.value;
const [mat]=v.split("|");

const batch=db.batch();

document.querySelectorAll("[data-dni]").forEach(div=>{

const dni=div.dataset.dni;
const r=document.getElementById("r"+dni).value;
const n=document.getElementById("n"+dni).value;

if(r){

batch.set(
db.collection("evaluaciones").doc(dni+mat),
{
alumnoDni:dni,
materia:mat,
rite:r,
nota:n
}
);

}

});

await batch.commit();

alert("Guardado");

}

// BOLETIN
async function cargarBoletin(){

const snap=await db.collection("evaluaciones")
.where("alumnoDni","==",user.id)
.get();

let html="";

snap.forEach(d=>{

const n=d.data();
const aprobado=n.nota>=7?"APROBADO":"DESAPROBADO";

html+=`
<div class="card">
${n.materia}<br>
RITE: ${n.rite}<br>
Nota: ${n.nota}<br>
Estado: <b>${aprobado}</b>
</div>
`;

});

boletin.innerHTML=html;

}

// PDF
function exportarPDF(){

const {jsPDF}=window.jspdf;
const pdf=new jsPDF();

pdf.text("Boletin CENS 451",20,20);

let y=40;

document.querySelectorAll("#boletin .card").forEach(card=>{
pdf.text(card.innerText,20,y);
y+=20;
});

pdf.save("boletin.pdf");

}

function logout(){
auth.signOut();
location.reload();
}

</script>
</body>
</html>
