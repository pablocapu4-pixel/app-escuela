<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>SISTEMA CENS 451 - Gestión 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-logout { background: var(--danger); }
        .student-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .rite-tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85em; }
        .TEA { background: #d4edda; color: #155724; } .TEP { background: #fff3cd; color: #856404; } .TED { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="card">
        <h2 style="text-align:center">CENS 451 - Acceso</h2>
        <input id="user-dni" placeholder="Ingrese su DNI">
        <input id="user-pass" type="password" value="123456">
        <button onclick="login()">Ingresar</button>
        <p id="msg-error" style="color:red; text-align:center"></p>
    </div>

    <div id="teacher-screen" class="hidden">
        <div class="card">
            <h2>Bienvenido/a, <span id="nombre-docente"></span></h2>
            <label>Seleccione Materia y Cuatrimestre:</label>
            <select id="select-materia" onchange="mostrarAlumnos()">
                <option value="">-- Mis Materias --</option>
            </select>
            <button class="btn-logout" onclick="salir()">Cerrar Sesión</button>
        </div>

        <div id="planilla-card" class="card hidden">
            <h3 id="titulo-materia"></h3>
            <div id="lista-alumnos"></div>
            <button onclick="guardarNotas()">💾 Guardar Calificaciones</button>
        </div>
    </div>
</div>

<script>
// CONFIGURACIÓN DE FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyAeezu1BHZch8eaNnVV-MJ6Rpdl1BzFHXY",
    authDomain: "app-escuela-cens451.firebaseapp.com",
    projectId: "app-escuela-cens451"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let docenteActivo = null;

async function login() {
    const dni = document.getElementById("user-dni").value.trim();
    const pass = document.getElementById("user-pass").value;
    try {
        await auth.signInWithEmailAndPassword(dni + "@cens451.edu.ar", pass);
        const doc = await db.collection("usuarios").doc(dni).get();
        
        if(!doc.exists) throw new Error("No hay datos en Firestore para este DNI.");
        
        docenteActivo = { id: dni, ...doc.data() };
        
        if(docenteActivo.rol !== "docente") {
            alert("Acceso solo para docentes");
            return;
        }

        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("teacher-screen").classList.remove("hidden");
        document.getElementById("nombre-docente").innerText = docenteActivo.nombre;
        
        cargarMenuMaterias();
    } catch(e) {
        document.getElementById("msg-error").innerText = "DNI o clave incorrectos.";
    }
}

function cargarMenuMaterias() {
    const select = document.getElementById("select-materia");
    const materiasMap = docenteActivo.MATERIAS || {};
    
    // Recorremos los años (1, 2, 3...)
    for (let anio in materiasMap) {
        const lista = materiasMap[anio];
        // Verificamos que sea un array y lo recorremos
        if (Array.isArray(lista)) {
            lista.forEach(materia => {
                // Limpiamos espacios o saltos de línea raros
                const nombreLimpio = materia.trim();
                let opt = document.createElement("option");
                opt.value = `${nombreLimpio}|${anio}`;
                opt.textContent = `${nombreLimpio} (${anio}° Año)`;
                select.appendChild(opt);
            });
        }
    }
}

async function mostrarAlumnos() {
    const value = document.getElementById("select-materia").value;
    if(!value) return;

    const [materia, anio] = value.split('|');
    document.getElementById("titulo-materia").innerText = materia;
    document.getElementById("planilla-card").classList.remove("hidden");

    const container = document.getElementById("lista-alumnos");
    container.innerHTML = "Cargando estudiantes...";

    const snap = await db.collection("usuarios")
        .where("rol", "==", "estudiante")
        .where("anio", "==", anio)
        .get();

    container.innerHTML = "";
    snap.forEach(doc => {
        container.innerHTML += `
            <div class="student-row" data-dni="${doc.id}">
                <span>${doc.data().nombre}</span>
                <select id="rite-${doc.id}">
                    <option value="">RITE</option>
                    <option value="TEA">TEA</option>
                    <option value="TEP">TEP</option>
                    <option value="TED">TED</option>
                </select>
                <input type="number" id="nota-${doc.id}" placeholder="Nota Final" min="1" max="10">
            </div>`;
    });
}

async function guardarNotas() {
    const [materia] = document.getElementById("select-materia").value.split('|');
    const batch = db.batch();
    const filas = document.querySelectorAll(".student-row");
    
    // Identificar cuatrimestre por el nombre de la materia (1 o 2)
    const cuat = materia.includes("1") ? "1" : (materia.includes("2") ? "2" : "1");

    filas.forEach(fila => {
        const dni = fila.dataset.dni;
        const rite = document.getElementById(`rite-${dni}`).value;
        const nota = parseFloat(document.getElementById(`nota-${dni}`).value);

        if(rite || !isNaN(nota)) {
            const ref = db.collection("evaluaciones").doc(`${dni}_${materia.replace(/\s+/g, '')}`);
            batch.set(ref, {
                alumnoDni: dni,
                materia: materia,
                cuat: cuat,
                rite: rite,
                nota: nota,
                aprobado: nota >= 7,
                fecha: new Date().toISOString()
            });
        }
    });

    await batch.commit();
    alert("Notas guardadas correctamente para " + materia);
}

function salir() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
