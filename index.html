<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>CENS 451 - Sistema Autónomo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #1a252f; --accent: #27ae60; --danger: #c0392b; --bg: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 4px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 5px solid var(--primary); }
        .hidden { display: none; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #bdc3c7; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-logout { background: var(--danger); }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--primary); color: white; }
        .stat-box { display: inline-block; padding: 20px; background: white; border-radius: 8px; margin: 10px; text-align: center; min-width: 120px; border: 1px solid #ddd; }
        .rite-tag { padding: 3px 7px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .TEA { background: #d4edda; color: #155724; } .TEP { background: #fff3cd; color: #856404; } .TED { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="card">
        <h2 style="text-align:center">CENS 451 - Gestión</h2>
        <input id="user-input" placeholder="DNI o Usuario">
        <input id="pass-input" type="password" value="123456" placeholder="Contraseña">
        <button onclick="iniciarSesion()">Entrar</button>
        <p id="login-error" style="color:red; text-align:center"></p>
    </div>

    <div id="admin-screen" class="hidden">
        <div class="card">
            <h2>📊 Panel Directivo</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button onclick="renderGestionUsuarios()">👥 Usuarios</button>
                <button onclick="renderEstadisticas()">📈 Estadísticas</button>
            </div>
            <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
        </div>
        <div id="admin-work-area"></div>
    </div>

    <div id="teacher-screen" class="hidden">
        <div class="card">
            <h2>👨‍🏫 Registro de Notas</h2>
            <select id="sel-materia" onchange="mostrarAlumnos()"><option value="">Seleccione Materia</option></select>
            <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
        </div>
        <div id="lista-estudiantes"></div>
        <button id="btn-save-grades" class="hidden" onclick="guardarNotas()">💾 Guardar Todo</button>
    </div>

    <div id="student-screen" class="hidden">
        <div class="card">
            <h2>🎓 Boletín Digital</h2>
            <h3 id="student-name-display"></h3>
            <table>
                <thead><tr><th>Materia</th><th>Cuat.</th><th>RITE</th><th>Nota</th></tr></thead>
                <tbody id="boletin-body"></tbody>
            </table>
            <button class="btn-logout" onclick="cerrarSesion()" style="margin-top:20px">Cerrar Sesión</button>
        </div>
    </div>
</div>

<script>
// --- CONFIGURACIÓN ---
const firebaseConfig = {
    apiKey: "AIzaSyAeezu1BHZch8eaNnVV-MJ6Rpdl1BzFHXY",
    authDomain: "app-escuela-cens451.firebaseapp.com",
    projectId: "app-escuela-cens451"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let sesionActiva = { user: "", rol: "", datos: {} };

// --- LOGIN ---
async function iniciarSesion() {
    const user = document.getElementById("user-input").value.trim();
    const pass = document.getElementById("pass-input").value;
    const err = document.getElementById("login-error");

    try {
        const email = user + "@cens451.edu.ar";
        await auth.signInWithEmailAndPassword(email, pass);
        const doc = await db.collection("usuarios").doc(user).get();
        
        if(!doc.exists) { err.innerText = "Error: Usuario sin datos en Firestore"; return; }
        
        sesionActiva = { user, rol: doc.data().rol, datos: doc.data() };
        document.getElementById("login-screen").classList.add("hidden");

        if(sesionActiva.rol === "directivo") {
            document.getElementById("admin-screen").classList.remove("hidden");
        } else if(sesionActiva.rol === "docente") {
            document.getElementById("teacher-screen").classList.remove("hidden");
            poblarMateriasDocente(sesionActiva.datos.MATERIAS);
        } else {
            document.getElementById("student-screen").classList.remove("hidden");
            cargarBoletin(user);
        }
    } catch(e) { err.innerText = "Usuario o clave incorrectos"; }
}

function cerrarSesion() { auth.signOut().then(() => location.reload()); }

// --- LÓGICA DOCENTE ---
function poblarMateriasDocente(materias) {
    const sel = document.getElementById("sel-materia");
    for(let anio in materias) {
        materias[anio].forEach(m => {
            let opt = document.createElement("option");
            opt.value = `${m}|${anio}`;
            opt.textContent = `${m} (${anio}° Año)`;
            sel.appendChild(opt);
        });
    }
}

async function mostrarAlumnos() {
    const [materia, anio] = document.getElementById("sel-materia").value.split('|');
    const container = document.getElementById("lista-estudiantes");
    container.innerHTML = "Buscando alumnos...";
    
    const snap = await db.collection("usuarios").where("rol","==","estudiante").where("anio","==",anio).get();
    container.innerHTML = "";
    
    snap.forEach(doc => {
        const alu = doc.data();
        container.innerHTML += `
            <div class="card">
                <b>${alu.nombre}</b><br>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px; margin-top:10px;">
                    <select id="cuat-${doc.id}"><option value="1">1° Cuat</option><option value="2">2° Cuat</option></select>
                    <select id="rite-${doc.id}"><option value="TEA">TEA</option><option value="TEP">TEP</option><option value="TED">TED</option></select>
                    <input type="number" id="nota-${doc.id}" placeholder="Nota" min="1" max="10">
                </div>
            </div>`;
    });
    document.getElementById("btn-save-grades").classList.remove("hidden");
}

async function guardarNotas() {
    const [materia] = document.getElementById("sel-materia").value.split('|');
    const batch = db.batch();
    const selects = document.querySelectorAll('[id^="rite-"]');

    selects.forEach(sel => {
        const dni = sel.id.replace('rite-', '');
        const cuat = document.getElementById(`cuat-${dni}`).value;
        const nota = document.getElementById(`nota-${dni}`).value;
        const rite = sel.value;

        const ref = db.collection("evaluaciones").doc(`${dni}_${materia}_${cuat}`);
        batch.set(ref, {
            alumnoDni: dni, materia, cuat, rite, nota, 
            docente: sesionActiva.user, fecha: new Date()
        });
    });
    await batch.commit();
    alert("¡Calificaciones guardadas!");
}

// --- LÓGICA ESTUDIANTE ---
async function cargarBoletin(dni) {
    document.getElementById("student-name-display").innerText = "DNI: " + dni;
    const snap = await db.collection("evaluaciones").where("alumnoDni","==",dni).get();
    const body = document.getElementById("boletin-body");
    body.innerHTML = "";
    snap.forEach(doc => {
        const e = doc.data();
        body.innerHTML += `<tr><td>${e.materia}</td><td>${e.cuat}</td><td><span class="rite-tag ${e.rite}">${e.rite}</span></td><td>${e.nota}</td></tr>`;
    });
}

// --- LÓGICA DIRECTIVO ---
function renderGestionUsuarios() {
    const area = document.getElementById("admin-work-area");
    area.innerHTML = `
        <div class="card">
            <h3>Nuevos Usuarios</h3>
            <input id="new-id" placeholder="DNI">
            <input id="new-name" placeholder="Nombre Apellido">
            <select id="new-rol"><option value="estudiante">Estudiante</option><option value="docente">Docente</option></select>
            <input id="new-anio" placeholder="Año (1, 2 o 3)">
            <button onclick="crearEnFirestore()">Crear en Base de Datos</button>
            <p><small>Nota: Debe crearlos manualmente en Firebase Auth con clave 123456</small></p>
        </div>
        <div id="admin-user-list"></div>`;
    cargarListaAdmin();
}

async function cargarListaAdmin() {
    const list = document.getElementById("admin-user-list");
    const snap = await db.collection("usuarios").get();
    list.innerHTML = "";
    snap.forEach(doc => {
        const u = doc.data();
        list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between">
            <span>${u.nombre} (${u.rol})</span>
            <button class="btn-logout" style="width:auto" onclick="eliminarF(${doc.id})">Borrar</button>
        </div>`;
    });
}

async function crearEnFirestore() {
    const id = document.getElementById("new-id").value;
    const nombre = document.getElementById("new-name").value;
    const rol = document.getElementById("new-rol").value;
    const anio = document.getElementById("new-anio").value;
    await db.collection("usuarios").doc(id).set({ nombre, rol, anio, MATERIAS: {} });
    renderGestionUsuarios();
}

async function eliminarF(id) {
    if(confirm("¿Seguro?")) { await db.collection("usuarios").doc(String(id)).delete(); renderGestionUsuarios(); }
}

async function renderEstadisticas() {
    const area = document.getElementById("admin-work-area");
    const snap = await db.collection("evaluaciones").get();
    let tea = 0, tep = 0, ted = 0;
    snap.forEach(doc => {
        const r = doc.data().rite;
        if(r === "TEA") tea++; if(r === "TEP") tep++; if(r === "TED") ted++;
    });
    area.innerHTML = `
        <div class="card" style="text-align:center">
            <h3>Estado General de Notas</h3>
            <div class="stat-box TEA">TEA: ${tea}</div>
            <div class="stat-box TEP">TEP: ${tep}</div>
            <div class="stat-box TED">TED: ${ted}</div>
        </div>`;
}
</script>
</body>
</html>
