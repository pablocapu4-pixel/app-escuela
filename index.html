<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>SISTEMA INTEGRAL CENS 451</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --dir-color: #8e44ad; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; min-height: 100vh; }
        .hidden { display: none !important; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* LOGIN */
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { width: 350px; border-top: 5px solid var(--primary); text-align: center; }

        /* LAYOUT PRINCIPAL */
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .navbar { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* TABLAS Y FORMULARIOS */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: var(--primary); }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--success); color: white; width: 100%; margin-top: 10px; }
        .btn-main:hover { opacity: 0.9; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; border-radius: 4px; }

        /* SECCIONES ESPECÍFICAS */
        .grid-eval { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { padding: 20px; color: white; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card login-box">
        <h2 style="color: var(--primary)">🏢 CENS 451</h2>
        <p>Gestión Institucional 2026</p>
        <input id="user-dni" type="text" placeholder="DNI de Usuario" style="width:100%; margin-bottom:10px;">
        <input id="user-pass" type="password" value="123456" style="width:100%; margin-bottom:10px;">
        <button class="btn-main" onclick="login()">INGRESAR AL SISTEMA</button>
        <p id="login-error" style="color:red; font-size: 13px; margin-top:10px;"></p>
    </div>
</div>

<div id="main-app" class="hidden">
    <nav class="navbar">
        <div><b>Sistema CENS 451</b> | <span id="display-name"></span></div>
        <button onclick="logout()" style="background:rgba(255,255,255,0.2); color:white; border: 1px solid white; border-radius: 4px; padding: 5px 15px;">Cerrar Sesión</button>
    </nav>

    <div class="container">
        
        <div id="view-docente" class="hidden">
            <div class="card">
                <h3>Carga de Calificaciones</h3>
                <label>Seleccione su materia y curso:</label>
                <select id="select-materia" onchange="cargarListaAlumnosDocente()" style="width:100%">
                    <option value="">-- Mis Materias --</option>
                </select>
            </div>
            <div id="docente-planilla-card" class="card hidden">
                <h3 id="materia-titulo" style="color: var(--primary)"></h3>
                <div class="grid-eval" style="font-weight:bold; background:#f0f0f0; padding: 10px; border-radius: 5px;">
                    <div>Alumno</div><div>R.I.T.E.</div><div>Nota</div>
                </div>
                <div id="lista-estudiantes-docente"></div>
                <button class="btn-main" onclick="guardarNotas()" style="background: var(--primary)">💾 GUARDAR EVALUACIONES</button>
            </div>
        </div>

        <div id="view-director" class="hidden">
            <div class="stats-grid">
                <div class="stat-card" style="background:#3498db"><h4 id="stat-alumnos">0</h4><p>Estudiantes</p></div>
                <div class="stat-card" style="background:#27ae60"><h4 id="stat-tea">0%</h4><p>Aprobación (TEA)</p></div>
                <div class="stat-card" style="background:#8e44ad"><h4 id="stat-docentes">0</h4><p>Docentes</p></div>
            </div>

            <div class="card" style="border-left: 5px solid var(--dir-color)">
                <h3>Altas de Usuarios (Docentes/Alumnos)</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:10px;">
                    <input id="adm-dni" placeholder="DNI">
                    <input id="adm-nombre" placeholder="Nombre y Apellido">
                    <select id="adm-rol">
                        <option value="estudiante">Estudiante</option>
                        <option value="docente">Docente</option>
                        <option value="director">Directivo</option>
                    </select>
                    <input id="adm-anio" placeholder="Año (ej: 3)">
                </div>
                <button class="btn-main" onclick="altaUsuario()" style="background: var(--dir-color)">+ REGISTRAR EN BASE DE DATOS</button>
            </div>

            <div class="card">
                <h3>Gestión de Usuarios y Bajas</h3>
                <table id="tabla-usuarios">
                    <thead><tr><th>DNI</th><th>Nombre</th><th>Rol</th><th>Año</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// CONFIGURACIÓN FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyAeezu1BHZch8eaNnVV-MJ6Rpdl1BzFHXY",
    authDomain: "app-escuela-cens451.firebaseapp.com",
    projectId: "app-escuela-cens451"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser = null;

// --- SISTEMA DE ACCESO ---
async function login() {
    const dni = document.getElementById("user-dni").value.trim();
    const pass = document.getElementById("user-pass").value;
    const err = document.getElementById("login-error");
    
    if(!dni) { err.innerText = "Ingrese su DNI"; return; }

    try {
        await auth.signInWithEmailAndPassword(dni + "@cens451.edu.ar", pass);
        const doc = await db.collection("usuarios").doc(dni).get();
        
        if (!doc.exists) {
            err.innerText = "Usuario no encontrado en la base de datos.";
            return;
        }
        
        currentUser = { id: dni, ...doc.data() };
        mostrarInterfaz(currentUser.rol);
    } catch (e) {
        err.innerText = "Error: DNI o clave incorrectos.";
        console.error(e);
    }
}

function mostrarInterfaz(rol) {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");
    document.getElementById("display-name").innerText = currentUser.nombre;

    if (rol === 'director') {
        document.getElementById("view-director").classList.remove("hidden");
        document.getElementById("view-docente").classList.add("hidden");
        cargarUsuariosAdmin();
        generarStats();
    } else {
        document.getElementById("view-docente").classList.remove("hidden");
        document.getElementById("view-director").classList.add("hidden");
        cargarMateriasDocente();
    }
}

// --- FUNCIONES PARA DOCENTES ---
function cargarMateriasDocente() {
    const select = document.getElementById("select-materia");
    const mats = currentUser.MATERIAS || {};
    select.innerHTML = '<option value="">-- Seleccionar Materia --</option>';
    
    Object.keys(mats).forEach(añoKey => {
        const contenido = mats[añoKey];
        if (typeof contenido === 'object' && !Array.isArray(contenido)) {
            Object.keys(contenido).forEach(cuatKey => {
                contenido[cuatKey].forEach(m => {
                    const añoNum = añoKey.replace(/\D/g, "");
                    const cuatNum = cuatKey.replace(/\D/g, "");
                    let opt = document.createElement("option");
                    opt.value = `${m}|${añoNum}|${cuatNum}`;
                    opt.textContent = `${m} (${añoNum}° Año - ${cuatNum}° Cuat.)`;
                    select.appendChild(opt);
                });
            });
        }
    });
}

async function cargarListaAlumnosDocente() {
    const val = document.getElementById("select-materia").value;
    if(!val) return;
    const [materia, año, cuat] = val.split('|');
    
    document.getElementById("materia-titulo").innerText = materia;
    document.getElementById("docente-planilla-card").classList.remove("hidden");
    const container = document.getElementById("lista-estudiantes-docente");
    container.innerHTML = "Cargando lista...";

    try {
        const snap = await db.collection("usuarios")
            .where("rol", "==", "estudiante")
            .where("año", "in", [año, `AÑO ${año}`, parseInt(año)])
            .get();

        container.innerHTML = "";
        if(snap.empty) {
            container.innerHTML = "<p>No hay alumnos registrados en este año.</p>";
            return;
        }

        snap.forEach(doc => {
            const alu = doc.data();
            container.innerHTML += `
                <div class="grid-eval" data-dni="${doc.id}">
                    <div>${alu.nombre}</div>
                    <select id="rite-${doc.id}">
                        <option value="">RITE</option><option value="TEA">TEA</option><option value="TEP">TEP</option><option value="TED">TED</option>
                    </select>
                    <input type="number" id="nota-${doc.id}" style="width:60px" min="1" max="10">
                </div>`;
        });
    } catch(e) { container.innerHTML = "Error al cargar alumnos."; }
}

async function guardarNotas() {
    const val = document.getElementById("select-materia").value;
    const [materia, año, cuat] = val.split('|');
    const batch = db.batch();
    
    document.querySelectorAll("[data-dni]").forEach(fila => {
        const dni = fila.dataset.dni;
        const rite = document.getElementById(`rite-${dni}`).value;
        const nota = document.getElementById(`nota-${dni}`).value;
        if(rite || nota) {
            const idDoc = `${dni}_${materia.replace(/\s+/g,'')}_C${cuat}`;
            batch.set(db.collection("evaluaciones").doc(idDoc), {
                alumnoDni: dni, materia, año, cuat, rite, nota, fecha: new Date().toISOString()
            });
        }
    });
    await batch.commit();
    alert("Planilla guardada con éxito.");
}

// --- FUNCIONES PARA DIRECTIVOS ---

    if(!dni || !nombre) { alert("Complete DNI y Nombre"); return; }

    try {
        await db.collection("usuarios").doc(dni
