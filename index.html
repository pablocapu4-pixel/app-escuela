<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>CENS 451 - GESTIÓN INTEGRAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --dir-color: #8e44ad; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; min-height: 100vh; }
        .hidden { display: none !important; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* LOGIN */
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { width: 350px; border-top: 5px solid var(--primary); text-align: center; }

        /* NAV */
        .navbar { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        
        /* TABLAS Y ELEMENTOS */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        .btn-main { background: var(--success); color: white; width: 100%; cursor: pointer; border: none; font-weight: bold; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }

        .grid-eval { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { padding: 20px; color: white; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card login-box">
        <h2 style="color: var(--primary)">🏢 CENS 451</h2>
        <p>Gestión Institucional 2026</p>
        <input id="user-dni" type="text" placeholder="DNI de Usuario" style="width:100%; margin-bottom:10px;">
        <input id="user-pass" type="password" value="123456" style="width:100%; margin-bottom:10px;">
        <button class="btn-main" id="btn-ingresar" onclick="login()">INGRESAR AL SISTEMA</button>
        <p id="login-error" style="color:red; font-size: 13px; margin-top:10px;"></p>
    </div>
</div>

<div id="main-app" class="hidden">
    <nav class="navbar">
        <div><b>CENS 451</b> | <span id="display-name"></span></div>
        <button onclick="logout()" style="background:transparent; color:white; border:1px solid white; cursor:pointer; padding:5px 10px;">Cerrar Sesión</button>
    </nav>

    <div class="container">
        <div id="view-director" class="hidden">
            <div class="stats-grid">
                <div class="stat-card" style="background:#3498db"><h4 id="stat-alumnos">0</h4><p>Alumnos</p></div>
                <div class="stat-card" style="background:#27ae60"><h4 id="stat-tea">0%</h4><p>TEA Institucional</p></div>
                <div class="stat-card" style="background:#8e44ad"><h4 id="stat-docentes">0</h4><p>Docentes</p></div>
            </div>
            <div class="card">
                <h3>Altas y Bajas (Gestión Directiva)</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:10px;">
                    <input id="adm-dni" placeholder="DNI">
                    <input id="adm-nombre" placeholder="Nombre Completo">
                    <select id="adm-rol">
                        <option value="estudiante">Estudiante</option>
                        <option value="docente">Docente</option>
                        <option value="director">Director/a</option>
                    </select>
                    <input id="adm-anio" placeholder="Año (ej: 3)">
                </div>
                <button class="btn-main" onclick="altaUsuario()" style="background:var(--dir-color); margin-top:10px;">+ REGISTRAR USUARIO</button>
            </div>
            <div class="card">
                <table id="tabla-usuarios">
                    <thead><tr><th>DNI</th><th>Nombre</th><th>Rol</th><th>Año</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="view-docente" class="hidden">
            <div class="card">
                <h3>Planilla de Calificaciones</h3>
                <select id="select-materia" onchange="cargarAlumnosDocente()" style="width:100%">
                    <option value="">-- Mis Materias --</option>
                </select>
            </div>
            <div id="planilla-docente-card" class="card hidden">
                <h3 id="materia-titulo"></h3>
                <div id="lista-estudiantes-docente"></div>
                <button class="btn-main" onclick="guardarNotas()" style="margin-top:20px;">💾 GUARDAR PLANILLA</button>
            </div>
        </div>
    </div>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyAeezu1BHZch8eaNnVV-MJ6Rpdl1BzFHXY",
    authDomain: "app-escuela-cens451.firebaseapp.com",
    projectId: "app-escuela-cens451"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let userLogueado = null;

// --- LOGIN CORREGIDO ---
async function login() {
    const dni = document.getElementById("user-dni").value.trim();
    const pass = document.getElementById("user-pass").value;
    const btn = document.getElementById("btn-ingresar");
    const errorMsg = document.getElementById("login-error");

    if(!dni) { errorMsg.innerText = "Debe ingresar un DNI"; return; }
    
    btn.disabled = true;
    btn.innerText = "Verificando...";
    errorMsg.innerText = "";

    try {
        // 1. Autenticación
        await auth.signInWithEmailAndPassword(dni + "@cens451.edu.ar", pass);
        
        // 2. Obtener datos de Firestore
        const doc = await db.collection("usuarios").doc(dni).get();
        
        if (doc.exists) {
            userLogueado = { id: dni, ...doc.data() };
            lanzarApp(userLogueado);
        } else {
            throw new Error("El usuario no existe en la base de datos.");
        }
    } catch (e) {
        errorMsg.innerText = "Acceso denegado: Revise DNI y clave.";
        console.error("Error Login:", e);
        btn.disabled = false;
        btn.innerText = "INGRESAR AL SISTEMA";
    }
}

function lanzarApp(user) {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("main-app").classList.remove("hidden");
    document.getElementById("display-name").innerText = user.nombre;

    if (user.rol === 'director') {
        document.getElementById("view-director").classList.remove("hidden");
        document.getElementById("view-docente").classList.add("hidden");
        cargarUsuariosAdmin();
        actualizarEstadisticas();
    } else {
        document.getElementById("view-docente").classList.remove("hidden");
        document.getElementById("view-director").classList.add("hidden");
        cargarMateriasDocente();
    }
}

// --- LÓGICA DIRECTOR ---
async function altaUsuario() {
    const dni = document.getElementById("adm-dni").value.trim();
    const nombre = document.getElementById("adm-nombre").value.trim();
    const rol = document.getElementById("adm-rol").value;
    const anio = document.getElementById("adm-anio").value.trim();

    if(!dni || !nombre) { alert("DNI y Nombre son obligatorios"); return; }

    await db.collection("usuarios").doc(dni).set({ 
        nombre, rol, año: anio, anio: anio 
    });
    alert("Usuario Creado");
    cargarUsuariosAdmin();
    actualizarEstadisticas();
}

async function cargarUsuariosAdmin() {
    const snap = await db.collection("usuarios").get();
    const tbody = document.querySelector("#tabla-usuarios tbody");
    tbody.innerHTML = "";
    snap.forEach(doc => {
        const u = doc.data();
        tbody.innerHTML += `<tr>
            <td>${doc.id}</td><td>${u.nombre}</td><td>${u.rol}</td><td>${u.año || '-'}</td>
            <td><button class="btn-del" onclick="eliminarUser('${doc.id}')">Eliminar</button></td>
        </tr>`;
    });
}

async function eliminarUser(id) {
    if(confirm("¿Eliminar usuario?")) {
        await db.collection("usuarios").doc(id).delete();
        cargarUsuariosAdmin();
    }
}

async function actualizarEstadisticas() {
    const alus = await db.collection("usuarios").where("rol","==","estudiante").get();
    const docs = await db.collection("usuarios").where("rol","==","docente").get();
    const evals = await db.collection("evaluaciones").get();
    
    document.getElementById("stat-alumnos").innerText = alus.size;
    document.getElementById("stat-docentes").innerText = docs.size;
    
    let teaCount = 0;
    evals.forEach(e => { if(e.data().rite === "TEA") teaCount++; });
    const porcentaje = evals.size > 0 ? ((teaCount / evals.size) * 100).toFixed(1) : 0;
    document.getElementById("stat-tea").innerText = porcentaje + "%";
}

// --- LÓGICA DOCENTE ---
function cargarMateriasDocente() {
    const select = document.getElementById("select-materia");
    const mats = userLogueado.MATERIAS || {};
    select.innerHTML = '<option value="">-- Mis Materias --</option>';
    
    Object.keys(mats).forEach(añoKey => {
        const contenido = mats[añoKey];
        if (typeof contenido === 'object' && !Array.isArray(contenido)) {
            Object.keys(contenido).forEach(cuatKey => {
                contenido[cuatKey].forEach(m => {
                    const aNum = añoKey.replace(/\D/g, "");
                    const cNum = cuatKey.replace(/\D/g, "");
                    let opt = document.createElement("option");
                    opt.value = `${m}|${aNum}|${cNum}`;
                    opt.textContent = `${m} (${aNum}° - ${cNum}° Cuat.)`;
                    select.appendChild(opt);
                });
            });
        }
    });
}

async function cargarAlumnosDocente() {
    const val = document.getElementById("select-materia").value;
    if(!val) return;
    const [materia, año, cuat] = val.split('|');
    
    document.getElementById("materia-titulo").innerText = materia + " (" + cuat + "° Cuat.)";
    document.getElementById("planilla-docente-card").classList.remove("hidden");
    const container = document.getElementById("lista-estudiantes-docente");
    container.innerHTML = "Cargando...";

    const snap = await db.collection("usuarios")
        .where("rol", "==", "estudiante")
        .where("año", "in", [año, `AÑO ${año}`, parseInt(año)])
        .get();

    container.innerHTML = "";
    snap.forEach(doc => {
        container.innerHTML += `
            <div class="grid-eval" data-dni="${doc.id}">
                <div>${doc.data().nombre}</div>
                <select id="rite-${doc.id}">
                    <option value="">RITE</option><option value="TEA">TEA</option><option value="TEP">TEP</option><option value="TED">TED</option>
                </select>
                <input type="number" id="nota-${doc.id}" style="width:50px">
            </div>`;
    });
}

async function guardarNotas() {
    const [materia, año, cuat] = document.getElementById("select-materia").value.split('|');
    const batch = db.batch();
    document.querySelectorAll("[data-dni]").forEach(fila => {
        const dni = fila.dataset.dni;
        const rite = document.getElementById(`rite-${dni}`).value;
        const nota = document.getElementById(`nota-${dni}`).value;
        if(rite || nota) {
            const idDoc = `${dni}_${materia.replace(/\s+/g,'')}_C${cuat}`;
            batch.set(db.collection("evaluaciones").doc(idDoc), {
                alumnoDni: dni, materia, año, cuat, rite, nota, fecha: new Date().toISOString()
            });
        }
    });
    await batch.commit();
    alert("Datos guardados.");
}

function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
