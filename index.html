<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>SISTEMA INTEGRAL CENS 451 - 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --dir-color: #8e44ad; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* LOGIN */
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { width: 350px; border-top: 5px solid var(--primary); }

        /* LAYOUT PRINCIPAL */
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .navbar { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        
        /* TABLAS Y FORMULARIOS */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        button { cursor: pointer; border: none; font-weight: bold; }
        .btn-main { background: var(--success); color: white; width: 100%; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; }

        /* SECCIONES ESPECÍFICAS */
        .grid-eval { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { padding: 20px; color: white; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
