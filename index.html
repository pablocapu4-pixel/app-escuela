<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="utf-8">

<title>Sistema Escolar CENS 451</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f0f3f7;
}

h1{
text-align:center;
margin-top:40px;
color:#2c3e50;
}

.sub{
text-align:center;
color:#777;
margin-bottom:40px;
}

.portal{
display:flex;
justify-content:center;
gap:20px;
}

.portal button{
width:220px;
height:120px;
font-size:18px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

.dir{background:#8e44ad;}
.doc{background:#2980b9;}
.est{background:#27ae60;}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

header{
background:#2c3e50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.hidden{
display:none;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<!-- PORTAL -->

<div id="portal">

<h1>SISTEMA ESCOLAR CENS 451</h1>
<p class="sub">Gestión académica 2026</p>

<div class="portal">

<button class="dir" onclick="preLogin('director')">
DIRECTIVOS
</button>

<button class="doc" onclick="preLogin('docente')">
DOCENTES
</button>

<button class="est" onclick="preLogin('estudiante')">
ESTUDIANTES
</button>

</div>

</div>


<!-- LOGIN -->

<div id="login" class="hidden">

<div class="container">

<div class="card">

<h3>Ingreso al sistema</h3>

<input id="dni" placeholder="DNI"><br><br>

<input id="pass" type="password" value="123456"><br><br>

<button onclick="login()">Ingresar</button>

<p id="error" style="color:red"></p>

</div>

</div>

</div>


<!-- APP -->

<div id="app" class="hidden">

<header>

<div id="usuario">Usuario</div>

<button onclick="logout()">Salir</button>

</header>

<div class="container">

<!-- PANEL DIRECTOR -->

<div id="director" class="hidden">

<div class="card">

<h3>Alta de usuario</h3>

<input id="ad_dni" placeholder="DNI">

<input id="ad_nombre" placeholder="Nombre">

<select id="ad_rol">

<option value="estudiante">Estudiante</option>
<option value="docente">Docente</option>
<option value="director">Directivo</option>

</select>

<input id="ad_anio" placeholder="Año">

<button onclick="crearUsuario()">Crear</button>

</div>

<div class="card">

<h3>Usuarios registrados</h3>

<div id="listaUsuarios"></div>

</div>

</div>


<!-- PANEL DOCENTE -->

<div id="docente" class="hidden">

<div class="card">

<h3>Materias</h3>

<select id="materias" onchange="cargarAlumnos()"></select>

</div>

<div class="card hidden" id="planilla">

<div id="tabla"></div>

<button onclick="guardarNotas()">Guardar notas</button>

</div>

</div>


<!-- PANEL ESTUDIANTE -->

<div id="estudiante" class="hidden">

<div class="card">

<h3>Mi boletín</h3>

<div id="boletin"></div>

</div>

</div>

</div>

</div>


<script>

/* CONFIGURAR FIREBASE */

const firebaseConfig = {

apiKey: "TU_API_KEY",
authDomain: "TU_DOMINIO.firebaseapp.com",
projectId: "TU_PROJECT_ID"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user=null;


/* LOGIN */

function preLogin(){

portal.classList.add("hidden");
login.classList.remove("hidden");

}


async function login(){

try{

const dni=document.getElementById("dni").value;
const pass=document.getElementById("pass").value;

await auth.signInWithEmailAndPassword(
dni+"@cens451.edu.ar",
pass
);

const doc=await db.collection("usuarios").doc(dni).get();

user={id:dni,...doc.data()};

abrirSistema();

}catch(e){

document.getElementById("error").innerText="Error de acceso";

console.log(e);

}

}


function abrirSistema(){

login.classList.add("hidden");
app.classList.remove("hidden");

document.getElementById("usuario").innerText=user.nombre;


if(user.rol=="director"){

document.getElementById("director").classList.remove("hidden");
cargarUsuarios();

}

if(user.rol=="docente"){

document.getElementById("docente").classList.remove("hidden");
cargarMaterias();

}

if(user.rol=="estudiante"){

document.getElementById("estudiante").classList.remove("hidden");
cargarBoletin();

}

}


/* CREAR USUARIO */

async function crearUsuario(){

const dni=document.getElementById("ad_dni").value;
const nombre=document.getElementById("ad_nombre").value;
const rol=document.getElementById("ad_rol").value;
const anio=document.getElementById("ad_anio").value;

await db.collection("usuarios").doc(dni).set({

nombre:nombre,
rol:rol,
año:anio

});

alert("Usuario creado");

cargarUsuarios();

}


/* LISTAR USUARIOS */

async function cargarUsuarios(){

const snap=await db.collection("usuarios").get();

let html="<table>";

snap.forEach(d=>{

const u=d.data();

html+=`
<tr>
<td>${d.id}</td>
<td>${u.nombre}</td>
<td>${u.rol}</td>
</tr>
`;

});

html+="</table>";

document.getElementById("listaUsuarios").innerHTML=html;

}


/* MATERIAS DOCENTE */

function cargarMaterias(){

const sel=document.getElementById("materias");

sel.innerHTML="";

if(!user.MATERIAS) return;

for(let a in user.MATERIAS){

user.MATERIAS[a].forEach(m=>{

let op=document.createElement("option");

op.value=m+"|"+a;
op.innerText=m+" Año "+a;

sel.appendChild(op);

});

}

}


/* ALUMNOS */

async function cargarAlumnos(){

const v=document.getElementById("materias").value;

const [mat,anio]=v.split("|");

planilla.classList.remove("hidden");

const snap=await db.collection("usuarios")
.where("rol","==","estudiante")
.where("año","==",anio)
.get();

let html="";

snap.forEach(d=>{

html+=`
<div data-dni="${d.id}">
${d.data().nombre}
<input id="nota_${d.id}" type="number">
</div>
`;

});

tabla.innerHTML=html;

}


/* GUARDAR */

async function guardarNotas(){

const v=document.getElementById("materias").value;
const [mat]=v.split("|");

const batch=db.batch();

document.querySelectorAll("[data-dni]").forEach(div=>{

const dni=div.dataset.dni;

const nota=document.getElementById("nota_"+dni).value;

batch.set(
db.collection("evaluaciones").doc(dni+mat),
{
alumnoDni:dni,
materia:mat,
nota:nota
}
);

});

await batch.commit();

alert("Notas guardadas");

}


/* BOLETIN */

async function cargarBoletin(){

const snap=await db.collection("evaluaciones")
.where("alumnoDni","==",user.id)
.get();

let html="";

snap.forEach(d=>{

const n=d.data();

html+=`
<div class="card">
${n.materia}<br>
Nota: ${n.nota}
</div>
`;

});

boletin.innerHTML=html;

}


function logout(){

auth.signOut();
location.reload();

}

</script>

</body>
</html>
