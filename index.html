<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

.panel{
background:white;
padding:20px;
margin:20px auto;
width:500px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select,button{
padding:10px;
margin:5px;
width:80%;
}

button{
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

</style>
</head>

<body>

<h1>📚 Sistema Escolar</h1>

<!-- LOGIN -->

<div class="panel" id="loginPanel">

<h2>Ingreso</h2>

<input id="dniLogin" placeholder="DNI">

<input type="password" id="passwordLogin" placeholder="Contraseña (solo docentes y directivos)">

<select id="rolLogin">
<option value="admin">Directivo</option>
<option value="docente">Docente</option>
<option value="alumno">Alumno</option>
</select>

<button onclick="login()">Ingresar</button>

</div>

<!-- PANEL ADMIN -->

<div class="panel" id="panelAdmin" style="display:none">

<h2>Panel Directivo</h2>

<h3>Cargar alumno</h3>

<input id="nombreAlumno" placeholder="Nombre">

<input id="dniAlumno" placeholder="DNI">

<input type="date" id="fechaNacimiento">

<input id="lugarNacimiento" placeholder="Lugar de nacimiento">

<input id="nacionalidad" placeholder="Nacionalidad">

<input id="anioIngreso" placeholder="Año de ingreso">

<button onclick="guardarAlumno()">Guardar alumno</button>

<h3>Lista de alumnos</h3>

<div id="listaAlumnos"></div>

<button onclick="salir()">Salir</button>

</div>

<!-- PANEL DOCENTE -->

<div class="panel" id="panelDocente" style="display:none">

<h2>Panel Docente</h2>

<select id="alumnoNota"></select>

<input id="materiaNota" placeholder="Materia">

<select id="cuatrimestreNota">
<option value="1">1° Cuatrimestre</option>
<option value="2">2° Cuatrimestre</option>
</select>

<input id="notaValor" placeholder="Nota">

<button onclick="guardarNota()">Guardar Nota</button>

<button onclick="salir()">Salir</button>

</div>

<!-- PANEL ALUMNO -->

<div class="panel" id="panelAlumno" style="display:none">

<h2>Boletín del estudiante</h2>

<div id="boletin"></div>

<button onclick="salir()">Salir</button>

</div>

<script>

let alumnos = JSON.parse(localStorage.getItem("alumnos")) || []
let notas = JSON.parse(localStorage.getItem("notas")) || []

let usuarioActual = null

// USUARIOS DEL SISTEMA

let usuariosSistema = {

admin:{
dni:"123",
password:"admin123"
},

docente:{
dni:"456",
password:"docente123"
}

}

// LOGIN

function login(){

let dni = document.getElementById("dniLogin").value
let password = document.getElementById("passwordLogin").value
let rol = document.getElementById("rolLogin").value

usuarioActual = dni

if(rol=="admin"){

if(dni==usuariosSistema.admin.dni && password==usuariosSistema.admin.password){

document.getElementById("loginPanel").style.display="none"
document.getElementById("panelAdmin").style.display="block"

mostrarAlumnos()

}else{

alert("Usuario o contraseña incorrecta")

}

}

if(rol=="docente"){

if(dni==usuariosSistema.docente.dni && password==usuariosSistema.docente.password){

document.getElementById("loginPanel").style.display="none"
document.getElementById("panelDocente").style.display="block"

cargarSelectAlumnos()

}else{

alert("Usuario o contraseña incorrecta")

}

}

if(rol=="alumno"){

document.getElementById("loginPanel").style.display="none"
document.getElementById("panelAlumno").style.display="block"

mostrarBoletin()

}

}

// SALIR

function salir(){
location.reload()
}

// GUARDAR ALUMNO

function guardarAlumno(){

let nombre = document.getElementById("nombreAlumno").value
let dni = document.getElementById("dniAlumno").value
let fecha = document.getElementById("fechaNacimiento").value
let lugar = document.getElementById("lugarNacimiento").value
let nacionalidad = document.getElementById("nacionalidad").value
let ingreso = document.getElementById("anioIngreso").value

alumnos.push({
nombre:nombre,
dni:dni,
fechaNacimiento:fecha,
lugarNacimiento:lugar,
nacionalidad:nacionalidad,
anioIngreso:ingreso
})

localStorage.setItem("alumnos",JSON.stringify(alumnos))

mostrarAlumnos()
cargarSelectAlumnos()

}

// MOSTRAR ALUMNOS

function mostrarAlumnos(){

let html=""

alumnos.forEach(a=>{

html+=`
<div style="border:1px solid #ccc;padding:10px;margin:5px">
<b>${a.nombre}</b><br>
DNI: ${a.dni}<br>
Fecha nacimiento: ${a.fechaNacimiento}<br>
Lugar nacimiento: ${a.lugarNacimiento}<br>
Nacionalidad: ${a.nacionalidad}<br>
Año ingreso: ${a.anioIngreso}
</div>
`

})

document.getElementById("listaAlumnos").innerHTML=html

}

// CARGAR ALUMNOS EN SELECT

function cargarSelectAlumnos(){

let select=document.getElementById("alumnoNota")

select.innerHTML=""

alumnos.forEach(a=>{

let op=document.createElement("option")

op.value=a.dni
op.text=a.nombre+" - "+a.dni

select.appendChild(op)

})

}

// GUARDAR NOTA

function guardarNota(){

let dni=document.getElementById("alumnoNota").value
let materia=document.getElementById("materiaNota").value
let cuatri=document.getElementById("cuatrimestreNota").value
let nota=document.getElementById("notaValor").value

notas.push({
dni:dni,
materia:materia,
cuatrimestre:cuatri,
nota:Number(nota)
})

localStorage.setItem("notas",JSON.stringify(notas))

alert("Nota guardada")

}

// MOSTRAR BOLETIN

function mostrarBoletin(){

let html="<table>"
html+="<tr><th>Materia</th><th>1°C</th><th>2°C</th><th>Promedio</th><th>Estado</th></tr>"

let materias={}

notas.forEach(n=>{

if(n.dni==usuarioActual){

if(!materias[n.materia]){
materias[n.materia]={c1:"-",c2:"-"}
}

if(n.cuatrimestre=="1") materias[n.materia].c1=n.nota
if(n.cuatrimestre=="2") materias[n.materia].c2=n.nota

}

})

for(let m in materias){

let c1=materias[m].c1
let c2=materias[m].c2

let promedio="-"
let estado="-"

if(c1!="-" && c2!="-"){

promedio=(c1+c2)/2

estado=promedio>=7 ? "Aprobado" : "Desaprobado"

}

html+=`
<tr>
<td>${m}</td>
<td>${c1}</td>
<td>${c2}</td>
<td>${promedio}</td>
<td>${estado}</td>
</tr>
`

}

html+="</table>"

document.getElementById("boletin").innerHTML=html

}

</script>

</body>
</html>
