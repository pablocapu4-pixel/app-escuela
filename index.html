<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>SISTEMA INTEGRAL CENS 451 - 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --dir: #8e44ad; --doc: #2980b9; --est: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .hidden { display: none !important; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* PANTALLA DE INICIO (3 PANELES) */
        .welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
        .panel-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 90%; max-width: 1000px; }
        .access-card { padding: 40px; text-align: center; color: white; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .access-card:hover { transform: translateY(-10px); filter: brightness(1.1); }
        .bg-dir { background: var(--dir); } .bg-doc { background: var(--doc); } .bg-est { background: var(--est); }

        /* INTERFAZ GENERAL */
        .navbar { color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .btn-action { width: 100%; font-weight: bold; cursor: pointer; border: none; padding: 12px; margin-top: 10px; border-radius: 6px; }

        /* ESTADISTICAS */
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .s-box { padding: 20px; color: white; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="portal-inicio" class="welcome-screen">
    <h1 style="color: var(--primary)">SISTEMA CENS 451</h1>
    <div class="panel-selector">
        <div class="access-card bg-dir" onclick="abrirLogin('director')"><h2>1. DIRECTIVOS</h2><p>Gestión e Informes</p></div>
        <div class="access-card bg-doc" onclick="abrirLogin('docente')"><h2>2. DOCENTES</h2><p>Carga de Notas</p></div>
        <div class="access-card bg-est" onclick="abrirLogin('estudiante')"><h2>3. ESTUDIANTES</h2><p>Mi Boletín</p></div>
    </div>
</div>

<div id="login-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000;">
    <div class="card" style="width:320px; text-align:center;">
        <h3 id="login-title">Acceso</h3>
        <input id="user-dni" placeholder="DNI" style="width:90%; margin-bottom:10px;">
        <input id="user-pass" type="password" value="123456" style="width:90%; margin-bottom:10px;">
        <button class="btn-action" id="btn-entrar" onclick="procesarLogin()" style="background:var(--primary); color:white;">ENTRAR</button>
        <button onclick="cerrarLogin()" style="background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">Volver</button>
        <p id="login-error" style="color:red; font-size:12px;"></p>
    </div>
</div>

<div id="app-content" class="hidden">
    <nav class="navbar" id="main-nav">
        <div id="nav-info"><b>CENS 451</b> | <span id="user-name"></span></div>
        <button onclick="location.reload()" style="background:white; color:black; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Salir</button>
    </nav>

    <div class="container">
        <div id="panel-director" class="hidden">
            <div class="grid-stats">
                <div class="s-box" style="background:var(--dir)"><h3 id="st-alus">0</h3><p>Alumnos</p></div>
                <div class="s-box" style="background:var(--success)"><h3 id="st-tea">0%</h3><p>TEA Institucional</p></div>
                <div class="s-box" style="background:var(--primary)"><h3 id="st-doc">0</h3><p>Docentes</p></div>
            </div>
            <div class="card">
                <h3>Administración de Usuarios</h3>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <input id="adm-dni" placeholder="DNI">
                    <input id="adm-nom" placeholder="Nombre">
                    <select id="adm-rol">
                        <option value="estudiante">Estudiante</option>
                        <option value="docente">Docente</option>
                    </select>
                    <input id="adm-anio" placeholder="Año">
                    <button onclick="altaUsuario()" style="background:var(--dir); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">+ ALTA</button>
                </div>
            </div>
            <div class="card">
                <table id="tabla-usuarios">
                    <thead><tr><th>DNI</th><th>Nombre</th><th>Rol</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="panel-docente" class="hidden">
            <div class="card">
                <h3>Carga de Planilla</h3>
                <select id="sel-materia" onchange="cargarAlumnosDocente()" style="width:100%"></select>
            </div>
            <div id="planilla-area" class="card hidden">
                <h3 id="materia-nom"></h3>
                <div id="lista-alumnos"></div>
                <button class="btn-action" onclick="guardarNotas()" style="background:var(--doc); color:white;">GUARDAR CUATRIMESTRE</button>
            </div>
        </div>

        <div id="panel-estudiante" class="hidden">
            <div class="card" style="text-align:center;">
                <h2>Mi Situación Académica 2026</h2>
                <div id="boletin-estudiante"></div>
            </div>
        </div>
    </div>
</div>

<script>
// CONFIGURACIÓN FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyAeezu1BHZch8eaNnVV-MJ6Rpdl1BzFHXY",
    authDomain: "app-escuela-cens451.firebaseapp.com",
    projectId: "app-escuela-cens451"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let rolSeleccionado = '';
let usuarioActual = null;

// GESTIÓN DE ACCESO
function abrirLogin(rol) {
    rolSeleccionado = rol;
    document.getElementById('login-modal').classList.remove('hidden');
    document.getElementById('login-title').innerText = "Acceso " + rol.toUpperCase();
}

function cerrarLogin() { document.getElementById('login-modal').classList.add('hidden'); }

async function procesarLogin() {
    const dni = document.getElementById('user-dni').value.trim();
    const pass = document.getElementById('user-pass').value;
    const err = document.getElementById('login-error');
    
    try {
        await auth.signInWithEmailAndPassword(dni + "@cens451.edu.ar", pass);
        const doc = await db.collection("usuarios").doc(dni).get();
        
        if (doc.exists && doc.data().rol === rolSeleccionado) {
            usuarioActual = { id: dni, ...doc.data() };
            iniciarSistema();
        } else {
            err.innerText = "DNI no habilitado para este panel.";
            auth.signOut();
        }
    } catch (e) { err.innerText = "Error de credenciales."; }
}

function iniciarSistema() {
    document.getElementById('portal-inicio').classList.add('hidden');
    document.getElementById('login-modal').classList.add('hidden');
    document.getElementById('app-content').classList.remove('hidden');
    document.getElementById('user-name').innerText = usuarioActual.nombre;
    
    const nav = document.getElementById('main-nav');
    if(rolSeleccionado === 'director') {
        nav.style.background = 'var(--dir)';
        document.getElementById('panel-director').classList.remove('hidden');
        cargarAdmin();
    } else if(rolSeleccionado === 'docente') {
        nav.style.background = 'var(--doc)';
        document.getElementById('panel-docente').classList.remove('hidden');
        prepararMateriasDocente();
    } else {
        nav.style.background = 'var(--est)';
        document.getElementById('panel-estudiante').classList.remove('hidden');
        verBoletin();
    }
}

    const dni = document.getElementById('adm-dni').value;
    const nom = document.getElementById('adm-nom').value;
    const rol = document.getElementById('adm-rol').value;
    const an
